<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANNIBAL FUR PRINCESS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin:0; padding:0; overflow:hidden; background:#000 url('https://files.catbox.moe/k30zqp.gif') center/cover fixed; image-rendering:pixelated; cursor:none; font-family:'Press Start 2P',system-ui; color:#ff00ff; }
        #container { position:relative; width:100vw; height:100vh; display:flex; justify-content:center; align-items:center; background:rgba(0,0,0,0.78); }

        .scanlines { position:absolute; inset:0; background:repeating-linear-gradient(to bottom,rgba(255,0,255,0.35) 0px,transparent 1px,transparent 3px); z-index:5; animation:scan 0.018s linear infinite; }
        @keyframes scan { 0%{background-position:0 0} 100%{background-position:0 1200px} }

        #video { max-width:96vw; max-height:96vh; border:16px solid #ff00ff; box-shadow:0 0 180px #ff00ff, 0 0 60px #00ffff; display:none; }

        #start-paw {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:50; text-align:center; cursor:pointer; filter:drop-shadow(0 0 60px #ff00ff);
        }
        #start-paw img { width:340px; }
        #start-text { font-size:2.8em; color:#ffff00; text-shadow:0 0 50px #ffff00; margin-top:25px; }

        #state-display { position:absolute; top:45px; font-size:3.2em; color:#00ffff; background:#000; padding:30px 90px; border:14px dashed #00ffff; box-shadow:0 0 100px #00ffff; display:none; z-index:20; text-transform:uppercase; }

        #tribute-float { position:absolute; top:35px; right:35px; font-size:1.9em; padding:16px 40px; background:#000; color:#ffff00; border:10px solid #ffff00; box-shadow:0 0 60px #ffff00; cursor:pointer; z-index:50; }

        .flash { animation:flashPulse 0.2s infinite !important; }
        @keyframes flashPulse { 0%,100%{opacity:0.04;transform:scale(0.55)rotate(-14deg)} 50%{opacity:1;transform:scale(1.5)rotate(14deg)} }

        .virus-window {
            position:absolute; width:480px; background:#000; border:16px solid #ff00ff; box-shadow:0 0 220px #ff00ff; z-index:40; display:none; image-rendering:pixelated;
        }
        .virus-titlebar { background:#ff00ff; color:#000; padding:12px; font-size:1.4em; text-align:left; border-bottom:10px solid #00ffff; }
        .virus-content { padding:12px; }
    </style>
</head>
<body>
    <div id="container">
        <div class="scanlines"></div>
        <div id="tribute-float" onclick="window.open('https://throne.com/cannibalprncss','_blank')">THRONE</div>

        <video id="video" autoplay playsinline></video>

        <div id="start-paw" onclick="startHunt()">
            <img src="https://files.catbox.moe/070iyo.mov" style="width:340px;">
            <div id="start-text">YOU wanted this</div>
        </div>

        <div id="state-display"></div>

        <div id="virus-window" class="virus-window">
            <div class="virus-titlebar">VIRUS DETECTED — PREY LOCATED</div>
            <div class="virus-content"><img id="virus-gif" src="" style="width:100%;"></div>
        </div>
    </div>

    <audio id="audio" src="https://files.catbox.moe/of5w5z.mp3" preload="auto"></audio>

    <script>
        let flashCount = 0;
        let currentState = "";
        const amounts = [11.11,22.22,33.33,44.44,55.55,66.66,77.77,88.88,99.99,111.11];
        const popupGifs = ["https://files.catbox.moe/14gid0.gif","https://files.catbox.moe/gvjp5u.gif","https://files.catbox.moe/dh1yx0.gif","https://files.catbox.moe/75805g.gif","https://files.catbox.moe/axti3y.gif","https://files.catbox.moe/09hw7w.gif","https://files.catbox.moe/cfkgp5.gif"];

        const threats = [
            "I can already smell your fur in {STATE}... Wanna stay safe? Send $11.11",
            "I'm thinking about driving to {STATE} tonight... Wanna stay safe? Send $22.22",
            "Your scent is all over {STATE} — I might just pay you a visit... Wanna stay safe? Send $33.33",
            "I keep imagining pinning you down in {STATE} and breeding you raw... Wanna stay safe? Send $44.44",
            "I'm getting hard just thinking about forcing my way into your hole in {STATE}... Wanna stay safe? Send $55.55",
            "Every time you throb in {STATE} I'm one step closer to coming there and raping you... Wanna stay safe? Send $66.66",
            "I'm gonna hunt you down in {STATE}, rip your clothes off and fuck you until you scream... Wanna stay safe? Send $77.77",
            "Your state is marked. I'm coming to {STATE} to rape that pretty fur until you break... Wanna stay safe? Send $88.88",
            "The whole pack knows where you leak in {STATE}. I'm driving there tonight to ruin you... Wanna stay safe? Send $99.99",
            "FINAL WARNING — I'm already packing for {STATE}. I'm going to find you, pin you down, and rape you until you can't walk. Wanna stay safe? Send $111.11"
        ];

        const videos = [
            "https://files.catbox.moe/070iyo.mov",
            "https://files.catbox.moe/rtw280.mp4",
            "https://files.catbox.moe/ykncjz.mp4"
        ];

        function showIntroVideos() {
            const video = document.getElementById('video');
            let i = 0;
            video.src = videos[0];
            video.style.display = 'block';
            video.play();

            video.onended = () => {
                i++;
                if (i < 3) {
                    video.src = videos[i];
                    video.play();
                } else {
                    video.style.display = 'none';
                    document.getElementById('start-paw').style.display = 'block';
                }
            };
        }

        function startHunt() {
            document.getElementById('start-paw').style.display = 'none';
            requestLocation();
        }

        function requestLocation() {
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    try {
                        const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
                        const data = await res.json();
                        currentState = data.principalSubdivision || "";
                    } catch(e) {}
                    
                    if (currentState) {
                        document.getElementById('state-display').innerHTML = `LOCATION LOCKED: ${currentState}`;
                        document.getElementById('state-display').style.display = 'block';
                    }
                    setTimeout(startPhases, 1400);
                },
                () => alert("PERMISSION DENIED?\nWeak prey."),
                { enableHighAccuracy: true, timeout: 15000 }
            );
        }

        function startPhases() {
            document.getElementById('audio').play().catch(() => {});
            setInterval(pulseFlash, 22000);
            pulseFlash();
        }

        function pulseFlash() {
            flashCount++;
            const amount = amounts[flashCount-1];
            const text = threats[flashCount-1].replace("{STATE}", currentState || "");

            document.getElementById('pulse-display').innerHTML = text;

            const intensity = flashCount / 10;
            document.getElementById('pulse-display').classList.add('flash');
            document.getElementById('overlay').style.opacity = Math.min(intensity * 0.99, 0.99);

            if (navigator.vibrate) navigator.vibrate([flashCount*150, 230, flashCount*260]);

            // Truly random pop-up position every flash
            const virus = document.getElementById('virus-window');
            const gif = document.getElementById('virus-gif');
            gif.src = popupGifs[Math.floor(Math.random()*popupGifs.length)];
            
            const top = 8 + Math.random() * 72;
            const left = 6 + Math.random() * 76;
            virus.style.top = `${top}%`;
            virus.style.left = `${left}%`;
            virus.style.transform = `rotate(${Math.random()*38 - 19}deg)`;
            virus.style.display = 'block';

            const audio = document.getElementById('audio');
            audio.volume = Math.min(0.4 + intensity*0.6, 1);
            audio.currentTime = 0;
            audio.play();

            if (flashCount === 10) {
                setTimeout(() => window.location.href = "https://throne.com/cannibalprncss", 3800);
            }

            setTimeout(() => {
                document.getElementById('pulse-display').classList.remove('flash');
                virus.style.display = 'none';
            }, 2000);
        }

        function sendToThrone() {
            window.open("https://throne.com/cannibalprncss", '_blank');
        }

        window.onload = () => {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => { if (e.key === "Escape") { alert("NO ESCAPE FROM MY FANGS."); e.preventDefault(); }});
            history.pushState(null, null, location.href);
            window.onpopstate = () => history.pushState(null, null, location.href);
            setTimeout(showIntroVideos, 400);
        };
    </script>
</body>
</html>
