<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cannibal Fur Princess</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
body {
    margin:0; padding:0; overflow:hidden; 
    background:#000 url('https://files.catbox.moe/k30zqp.gif') center/cover fixed;
    font-family:'Press Start 2P', system-ui; color:#ff00ff; cursor:none; image-rendering:pixelated;
}
#container { position:relative; width:100vw; height:100vh; }

video#intro-video {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    max-width:96vw; max-height:96vh; z-index:10; border:0; background:#000;
}

#start-paw {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    display:none; cursor:pointer; z-index:50; text-align:center;
}
#start-paw img { width:300px; filter:drop-shadow(0 0 40px #ff00ff); }
#start-paw span { display:block; font-size:2em; color:#00ffff; text-shadow:0 0 20px #00ffff,0 0 40px #ff00ff; margin-top:10px; }

#state-display {
    position:absolute; top:40px; left:50%; transform:translateX(-50%);
    font-size:2em; color:#00ffff; background:#000; padding:20px 40px;
    border:4px dashed #ff00ff; box-shadow:0 0 40px #ff00ff,0 0 60px #00ffff;
    text-align:center; display:none; z-index:20;
}

#tribute-link {
    position:absolute; top:20px; right:20px; font-size:1.2em; color:#ffff00;
    cursor:pointer; text-decoration:none; z-index:50;
}

#progress-container {
    position:absolute; bottom:50px; left:50%; transform:translateX(-50%);
    width:60%; height:30px; background:#000; border:4px solid #ff00ff;
    box-shadow:0 0 40px #ff00ff; display:none;
}
#progress-bar {
    width:0%; height:100%; background: linear-gradient(90deg,#ff00ff,#00ffff);
    box-shadow:0 0 25px #ff00ff; transition:width 0.8s linear;
}
#progress-text {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#000; font-size:1em; font-weight:bold; z-index:31;
    text-shadow:0 0 8px #ffff00;
}

.virus-window {
    position:absolute; width:250px; border:4px solid #ff00ff;
    box-shadow:0 0 100px #ff00ff,0 0 50px #00ffff; display:none; z-index:40;
}
.virus-window img { width:100%; display:block; }
</style>
</head>
<body>
<div id="container">

<video id="intro-video" autoplay muted></video>

<div id="start-paw">
    <img src="https://i.ibb.co/CHT1YTP/cute-paw.png" alt="paw">
    <span>Click Me 💖</span>
</div>

<div id="state-display"></div>

<a id="tribute-link" href="https://throne.com/cannibalprncss" target="_blank">THRONE</a>

<div id="progress-container">
    <div id="progress-bar"></div>
    <div id="progress-text">PAWRRUPTION 0%</div>
</div>

</div>

<audio id="audio" src="https://files.catbox.moe/of5w5z.mp3" preload="auto"></audio>

<script>
const introVideos = [
    {src:'https://files.catbox.moe/070iyo.mov', text:'hi click slut'},
    {src:'https://files.catbox.moe/rtw280.mp4', text:'guess what i found'},
    {src:'https://files.catbox.moe/ykncjz.mp4', text:'YOU!!!'}
];
const popups = [
    'https://files.catbox.moe/14gid0.gif',
    'https://files.catbox.moe/gvjp5u.gif',
    'https://files.catbox.moe/dh1yx0.gif',
    'https://files.catbox.moe/75805g.gif',
    'https://files.catbox.moe/axti3y.gif',
    'https://files.catbox.moe/09hw7w.gif',
    'https://files.catbox.moe/cfkgp5.gif'
];
const threats = [
    "Mmm I can already smell your fur in {STATE}...",
    "Thinking about taking a little trip to {STATE} tonight...",
    "I might just mess with you in {STATE}...",
    "Imagine me pinning you down in {STATE}...",
    "Gonna ruin your vibe in {STATE} shamelessly...",
    "I know exactly where you are in {STATE}...",
    "You're mine in {STATE}, I can’t resist...",
    "I see you quivering in {STATE}...",
    "Oh, {STATE}, you’re gonna regret teasing me...",
    "FINAL phase — I’m coming for you in {STATE}!"
];

let currentState="", flashCount=0;

const videoEl = document.getElementById('intro-video');
const pawEl = document.getElementById('start-paw');
const stateEl = document.getElementById('state-display');
const audioEl = document.getElementById('audio');
const progressContainer = document.getElementById('progress-container');
const progressBar = document.getElementById('progress-bar');
const progressText = document.getElementById('progress-text');

let introIndex = 0;

function playIntro() {
    if(introIndex >= introVideos.length){
        videoEl.style.display='none';
        pawEl.style.display='block';
        return;
    }
    videoEl.src=introVideos[introIndex].src;
    videoEl.style.display='block';
    videoEl.play();
    videoEl.onended=()=>{
        introIndex++;
        playIntro();
    };
}

pawEl.onclick=()=>{ 
    pawEl.style.display='none';
    requestLocation();
};

function requestLocation() {
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(pos=>{
            const lat=pos.coords.latitude, lon=pos.coords.longitude;
            fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`)
            .then(r=>r.json())
            .then(data=>{currentState=data.principalSubdivision||"Unknown"; startPhases();})
            .catch(()=>{currentState="Unknown"; startPhases();});
        }, ()=>{currentState="Unknown"; startPhases();});
    } else {currentState="Unknown"; startPhases();}
}

function startPhases(){
    stateEl.innerHTML=`LOCATION LOCKED: ${currentState}`;
    stateEl.style.display='block';
    progressContainer.style.display='block';
    audioEl.play().catch(()=>{});
    const interval=setInterval(()=>{
        flashCount++;
        progressBar.style.width=(flashCount*10)+'%';
        progressText.innerHTML=`PAWRRUPTION ${flashCount*10}%`;

        // show random popup
        const popup = document.createElement('div');
        popup.className='virus-window';
        const img = document.createElement('img');
        img.src=popups[Math.floor(Math.random()*popups.length)];
        popup.appendChild(img);
        popup.style.top=(Math.random()*70+10)+'%';
        popup.style.left=(Math.random()*70+10)+'%';
        popup.style.transform=`rotate(${Math.random()*30-15}deg)`;
        document.getElementById('container').appendChild(popup);
        popup.style.display='block';
        setTimeout(()=>{popup.remove();},2000);

        // threat text update
        stateEl.innerHTML=threats[flashCount-1].replace("{STATE}",currentState);

        audioEl.currentTime=0; audioEl.play().catch(()=>{});

        if(flashCount>=10){
            clearInterval(interval);
            setTimeout(()=>{window.location.href='https://throne.com/cannibalprncss';},2000);
        }
    },2000);
}

window.onload=()=>{playIntro();};
</script>
</body>
</html>
