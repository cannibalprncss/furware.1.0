<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANNIBAL FUR PRINCESS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
body {
    margin:0; padding:0; overflow:hidden;
    background:#000 url('https://files.catbox.moe/k30zqp.gif') center/cover fixed;
    image-rendering:pixelated;
    font-family:'Press Start 2P', system-ui;
    color:#ff00ff;
}
#container { position:relative; width:100vw; height:100vh; }

.scanlines {
    position:absolute; inset:0;
    background:repeating-linear-gradient(to bottom, rgba(255,0,255,0.35) 0px, transparent 1px, transparent 3px);
    z-index:5;
    animation:scan 0.02s linear infinite;
}
@keyframes scan { 0%{background-position:0 0} 100%{background-position:0 1200px} }

#video {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    max-width:96vw; max-height:96vh; border:8px solid #ff00ff;
    box-shadow:0 0 160px #ff00ff;
    z-index:10;
    opacity:0;
    transition: opacity 0.8s ease-in-out;
}

#start-btn {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:50; text-align:center; cursor:pointer;
    display:block;
}

#start-btn img { width:360px; }

#progress-container {
    position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
    width:70%; background:#000; border:4px solid #ff00ff; box-shadow:0 0 40px #ff00ff;
    padding:8px; z-index:20;
    display:none;
}
#progress-bar { height:24px; background:linear-gradient(90deg,#ff00ff,#00ffff); width:0%; transition:width 0.8s linear; }
#progress-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:1.4em; color:#000; text-shadow:0 0 6px #ffff00; font-weight:bold;
}

.pulse-text {
    position:absolute; top:40%; left:50%; transform:translate(-50%,-50%);
    font-size:2.8em; text-align:center; max-width:80%; color:#ff00ff; z-index:25; display:none;
}

.virus-window {
    position:absolute; width:360px; background:#000; border:8px solid #ff00ff;
    box-shadow:0 0 150px #ff00ff; z-index:30; display:none; image-rendering:pixelated;
}
.virus-content img { width:100%; }

#end-screen {
    display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:60;
}
#end-screen img {
    margin:15px; cursor:pointer; width:220px; max-width:80vw; border:6px solid #ff00ff; box-shadow:0 0 40px #ff00ff;
}
</style>
</head>
<body>
<div id="container">
    <div class="scanlines"></div>
    <video id="video" autoplay playsinline muted></video>

    <div id="start-btn">
        <img src="https://files.catbox.moe/8mg6vt.gif" alt="Start Button">
    </div>

    <div id="pulse" class="pulse-text"></div>

    <div id="progress-container">
        <div id="progress-bar"></div>
        <div id="progress-text">PAWRRUPTION 0%</div>
    </div>

    <div class="virus-window" id="virus">
        <div class="virus-content">
            <img id="virus-gif" src="">
        </div>
    </div>

    <div id="end-screen">
        <img src="https://files.catbox.moe/6w8f98.gif" onclick="window.open('https://throne.com/cannibalprncss','_blank')" alt="Throne">
        <img src="https://files.catbox.moe/gvhux3.gif" onclick="window.open('https://twitter.com/intent/tweet?text=Nghh!!%20today%20i%20decided%20to%20be%20a%20fur%20loving%20freak%20and%20let%20kandis%20squishy%20paws%20track%20my%20location%20%F0%9F%98%95%E2%80%8D%F0%9F%8C%9B%F0%9F%93%8D%F0%9F%90%BE!!%0Amy%20mind%20is%20korrupted%20and%20now%20im%20perma%20addicted%20to%20kandis%20paws!!%0Aclick%20click%20click%20%26%20become%20perma%20addicted%20too%20!!%F0%9F%90%BE%E2%9C%97%0A%40s0ul_tak3r777%0Ahttps%3A%2F%2Fcannibalprncss.github.io%2Ffurware.v.1.0','_blank')" alt="Tweet">
    </div>
</div>

<audio id="audio" src="https://files.catbox.moe/of5w5z.mp3" preload="auto"></audio>

<script>
const videos = [
    "https://files.catbox.moe/070iyo.mov",
    "https://files.catbox.moe/rtw280.mp4",
    "https://files.catbox.moe/ykncjz.mp4"
];
const popups = [
    "https://files.catbox.moe/14gid0.gif","https://files.catbox.moe/gvjp5u.gif",
    "https://files.catbox.moe/dh1yx0.gif","https://files.catbox.moe/75805g.gif",
    "https://files.catbox.moe/axti3y.gif","https://files.catbox.moe/09hw7w.gif",
    "https://files.catbox.moe/cfkgp5.gif"
];
const threats = [
    "I know you’re dripping in {STATE}… Wanna get caught?",
    "I might pop over to {STATE} soon… better behave",
    "Thinking about finding you in {STATE}… stay ready",
    "You’re marked in {STATE}… can’t wait to play",
    "I see your scent in {STATE}… gonna make it fun",
    "You better hide in {STATE}… or I’ll find you",
    "Every corner of {STATE} is mine to track…"
];

let flashCount = 0;
let currentState = "";
let videoIndex = 0;

const videoEl = document.getElementById('video');
const startBtn = document.getElementById('start-btn');
const audioEl = document.getElementById('audio');
const pulse = document.getElementById('pulse');
const progressBar = document.getElementById('progress-bar');
const progressText = document.getElementById('progress-text');
const virus = document.getElementById('virus');
const virusImg = document.getElementById('virus-gif');
const progressContainer = document.getElementById('progress-container');
const endScreen = document.getElementById('end-screen');

// Video fade function
function fadeVideo(nextSrc){
    videoEl.style.opacity = 0;
    setTimeout(()=>{
        videoEl.src = nextSrc;
        videoEl.play();
        videoEl.style.opacity = 1;
    }, 700);
}

videoEl.addEventListener('ended', ()=>{
    videoIndex++;
    if(videoIndex < videos.length){
        fadeVideo(videos[videoIndex]);
    } else {
        startBtn.style.display = 'block';
    }
});

// Start button
startBtn.addEventListener('click', ()=>{
    startBtn.style.display = 'none';
    audioEl.play();
    getLocation();
});

function getLocation(){
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(
            pos=>{
                currentState = "Your Area";
                startPhases();
            },
            err=>{
                currentState = "Your Area";
                startPhases();
            }
        );
    } else {
        currentState = "Your Area";
        startPhases();
    }
}

function startPhases(){
    pulse.style.display = 'block';
    progressContainer.style.display = 'block';
    let phaseInterval = setInterval(flashPhase, 1900);
    flashPhase();

    function flashPhase(){
        flashCount++;
        pulse.innerHTML = threats[flashCount % threats.length].replace("{STATE}", currentState);

        let prog = Math.min(flashCount * 10,100);
        progressBar.style.width = prog + '%';
        progressText.innerHTML = `PAWRRUPTION ${prog}%`;

        // random popup
        let gif = popups[Math.floor(Math.random()*popups.length)];
        virusImg.src = gif;
        virus.style.top = 10 + Math.random()*70 + "%";
        virus.style.left = 8 + Math.random()*74 + "%";
        virus.style.display = "block";

        setTimeout(()=> virus.style.display="none", 2000);

        audioEl.currentTime = 0;
        audioEl.volume = Math.min(0.5 + flashCount/10,1);
        audioEl.play();

        if(flashCount===10){
            clearInterval(phaseInterval);
            setTimeout(()=> {
                pulse.style.display='none';
                progressContainer.style.display='none';
                endScreen.style.display='block';
            },800);
        }
    }
}

window.onload = ()=>{
    videoEl.src = videos[0];
    videoEl.style.opacity = 1;
};
</script>
</body>
</html>
